{% extends "layout.html" %}

{% block content %}

<div class="container mt-5 pt-5">

    <div class="row">

        <!-- FORMULARIO -->

        <div class="col-lg-7">

            <div class="card shadow p-4">

                <h2 class="mb-4">

                    Finalizar Compra

                </h2>

                <form id="form-checkout">

                    <div class="mb-3">

                        <label>Nombre Completo</label>

                        <input
                            type="text"
                            class="form-control"
                            id="nombre"
                            required>

                    </div>

                    <div class="mb-3">

                        <label>Teléfono</label>

                        <input
                            type="text"
                            class="form-control"
                            id="telefono"
                            required>

                    </div>

                    <div class="mb-3">

                        <label>Correo</label>

                        <input
                            type="email"
                            class="form-control"
                            id="correo">

                    </div>

                    <div class="mb-3">

                        <label>Dirección</label>

                        <input
                            type="text"
                            class="form-control"
                            id="direccion"
                            required>

                    </div>

                    <div class="mb-3">

                        <label>Ciudad</label>

                        <input
                            type="text"
                            class="form-control"
                            id="ciudad"
                            required>

                    </div>

                    <div class="mb-3">

                        <label>Observaciones</label>

                        <textarea
                            class="form-control"
                            id="observaciones"
                            rows="4"></textarea>

                    </div>

                    <hr>

                    <h4>Método de Pago</h4>

                    <div class="form-check">

                        <input
                            class="form-check-input"
                            type="radio"
                            name="pago"
                            value="Nequi"
                            checked>

                        <label class="form-check-label">

                            Nequi

                        </label>

                    </div>

                    <div class="form-check">

                        <input
                            class="form-check-input"
                            type="radio"
                            name="pago"
                            value="Daviplata">

                        <label class="form-check-label">

                            Daviplata

                        </label>

                    </div>

                    <div class="form-check">

                        <input
                            class="form-check-input"
                            type="radio"
                            name="pago"
                            value="Transferencia Bancolombia">

                        <label class="form-check-label">

                            Transferencia Bancolombia

                        </label>

                    </div>

                    <div class="form-check">

                        <input
                            class="form-check-input"
                            type="radio"
                            name="pago"
                            value="Contra Entrega">

                        <label class="form-check-label">

                            Pago Contra Entrega

                        </label>

                    </div>

                    <button
                        type="button"
                        class="btn btn-principal w-100 mt-4"
                        onclick="enviarPedido()">


                    Confirmar Pedido

                    </button>

                </form>

            </div>

        </div>

        <!-- RESUMEN -->

        <div class="col-lg-5">

            <div class="card shadow p-4">

                <h3>

                    Resumen

                </h3>

                <hr>

                <div id="resumen-checkout">

                </div>

                <hr>

                <h4 id="checkout-total">

                    Total: $0

                </h4>

            </div>

        </div>

    </div>

</div>

{% endblock %}
