<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Samrise Nutty</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/styles.css') }}">

</head>

<body>

<nav class="navbar navbar-expand-lg bg-white shadow-sm">

    <div class="container">

        <a class="navbar-brand fw-bold" href="/">
            🥜 Samrise Nutty
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#menu">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="menu">

            <ul class="navbar-nav ms-auto align-items-center">

                <li class="nav-item">
                    <a class="nav-link" href="/">Inicio</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/catalogo">Productos</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/admin/login">
                        Administrador
                    </a>
                </li>

                <li class="nav-item ms-3">

                    <a href="/carrito"
                       class="btn btn-warning position-relative">

                        <i class="fa-solid fa-cart-shopping"></i>

                        <span
                            id="contador-carrito"
                            class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">

                            0

                        </span>

                    </a>

                </li>

            </ul>

        </div>

    </div>

</nav>

{% block content %}
{% endblock %}

<footer class="bg-dark text-white text-center py-4 mt-5">

    <p class="mb-0">

        © 2026 Samrise Nutty · Productos naturales y saludables.

    </p>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
<script src="{{ url_for('static', filename='js/carrito.js') }}"></script>
<script src="{{ url_for('static', filename='js/checkout.js') }}"></script>
<script src="{{ url_for('static', filename='js/catalogo.js') }}"></script>
<!-- NOTIFICACIÓN -->

<div id="toast-carrito" class="toast-carrito">

    <div class="toast-icono">
        <i class="fa-solid fa-circle-check"></i>
    </div>

    <div>

        <strong>Producto agregado</strong>

        <div id="toast-texto"></div>

    </div>

</div>

</body>
</html>
